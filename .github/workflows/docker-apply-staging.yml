name: Docker build, push and deploy Staging

on:
  push:
    branches:
      - main
    paths:
      - "export/**"
      - ".github/workflows/docker-apply-staging.yml"

env: 
  AWS_REGION: ca-central-1
  REGISTRY: ${{ vars.STAGING_AWS_ACCOUNT_ID }}.dkr.ecr.ca-central-1.amazonaws.com
  TAG_VERSION: ${{ github.sha }}

permissions: {}
  
jobs:
  docker-build-push-deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - export: platform/gc_notify
            lambda: platform-gc-notify-export
          - export: platform/gc_design_system/airtable
            lambda: platform-gc-design-system-airtable-export
          - export: platform/gc_design_system/npm
            lambda: platform-gc-design-system-npm-export
          - export: platform/gc_design_system/cloudfront
            lambda: platform-gc-design-system-cloudfront-export
          - export: platform/support/freshdesk
            lambda: platform-support-freshdesk-export
          - export: operations/google_analytics
            lambda: operations-google-analytics-export

    steps:
    - name: Audit DNS requests
      uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
      env:
        DNS_PROXY_FORWARDTOSENTINEL: "true"
        DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
        DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
        DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
        DNS_PROXY_WILDCARDGREEDY: "true"

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      id: changes
      with:
        filters: |
          export:
            - 'export/${{ matrix.export }}/**'
            - '.github/workflows/docker-apply-staging.yml'

    - name: Exit if no changes
      if: steps.changes.outputs.export == 'false'
      run: |
        echo "No changes to deploy"
        exit 0

    - name: Configure AWS credentials using OIDC
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/data-lake-docker-push
        role-session-name: DockerBuildPushDeploy
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

    - name: Build and push Docker image to Amazon ECR
      working-directory: ./export/${{ matrix.export }}
      run: |
        make docker
        docker tag ${{matrix.lambda}} $REGISTRY/${{matrix.lambda}}:${{ env.TAG_VERSION }}
        docker tag ${{matrix.lambda}} $REGISTRY/${{matrix.lambda}}:latest
        docker push $REGISTRY/${{matrix.lambda}}:${{ env.TAG_VERSION }}
        docker push $REGISTRY/${{matrix.lambda}}:latest

    - name: Update Lambda Docker image
      run: |
        aws lambda update-function-code \
          --function-name ${{matrix.lambda}} \
          --image-uri $REGISTRY/${{matrix.lambda}}:${{ env.TAG_VERSION }} > /dev/null 2>&1
        aws lambda wait function-updated \
          --function-name ${{matrix.lambda}}

  docker-sbom:
    needs: docker-build-push-deploy
    permissions:
      contents: write
    uses: ./.github/workflows/docker-sbom-staging.yml
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
      LOG_ANALYTICS_WORKSPACE_KEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}

  notify-workflow-failure:
    if: failure()
    needs:
      - docker-build-push-deploy
    uses: ./.github/workflows/workflow-failure.yml
    with:
      workflow_name: ${{ github.workflow }}
      workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
      LOG_ANALYTICS_WORKSPACE_KEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_OPS }}
