name: "Terragrunt apply STAGING"

concurrency:
  group: terragrunt-staging
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - "terragrunt/aws/**"
      - "terragrunt/env/staging/**"
      - "terragrunt/env/common/**"
      - "terragrunt/env/root.hcl"
      - ".github/workflows/terragrunt-apply-staging.yml"

env:
  AWS_REGION: ca-central-1
  TF_INPUT: false
  TF_VAR_cloudwatch_alarm_slack_webhook: ${{ secrets.STAGING_SLACK_WEBHOOK_OPS }}
  TF_VAR_freshdesk_api_key: ${{ secrets.STAGING_FRESHDESK_API_KEY }}
  TF_VAR_airtable_api_key: ${{ secrets.STAGING_AIRTABLE_API_KEY }}
  TF_VAR_airtable_base_id: ${{ secrets.STAGING_AIRTABLE_BASE_ID }}
  TF_VAR_airtable_table_name_clients: ${{ secrets.STAGING_AIRTABLE_TABLE_NAME_CLIENTS }}
  TF_VAR_airtable_table_name_teams: ${{ secrets.STAGING_AIRTABLE_TABLE_NAME_TEAMS }}
  TF_VAR_airtable_table_name_services: ${{ secrets.STAGING_AIRTABLE_TABLE_NAME_SERVICES }}
  TF_VAR_gcp_project_number: ${{ secrets.GCP_PROJECT_NUMBER }}
  TF_VAR_gcp_pool_id: ${{ secrets.GCP_POOL_ID }}
  TF_VAR_gcp_provider_id: ${{ secrets.STAGING_GCP_PROVIDER_ID }}
  TF_VAR_gcp_service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
  TF_VAR_gcp_ga_property_forms_marketing_site: ${{ secrets.GCP_GA_PROPERTY_FORMS_MARKETING_SITE }}
  TF_VAR_gcp_ga_property_notification_ga4: ${{ secrets.GCP_GA_PROPERTY_NOTIFICATION_GA4 }}
  TF_VAR_gcp_ga_property_platform_form_client: ${{ secrets.GCP_GA_PROPERTY_PLATFORM_FORM_CLIENT }}
  TF_VAR_gcp_ga_property_platform_core_superset_doc: ${{ secrets.GCP_GA_PROPERTY_PLATFORM_CORE_SUPERSET_DOC }}
  TF_VAR_qualtrics_external_id: ${{ secrets.QUALTRICS_EXTERNAL_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  terragrunt-apply-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0
        env:
          CONFTEST_VERSION: NONE
          TERRAFORM_VERSION: 1.14.8
          TERRAFORM_CHECKSUM: e8bbcefea8015156e04e2a325cde37a0b2fb761728bda548e2fe3b8ad7c18c96
          TERRAGRUNT_VERSION: 0.98.0
          TERRAGRUNT_CHECKSUM: 68a9e029b438957c4164e505dfade123c67d6c3c3e11880bcadf3f2b33a8d865
          TF_SUMMARIZE_VERSION: NONE
          TRUFFLEHOG_VERSION: NONE

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::454671348950:role/data-lake-apply
          role-session-name: TFApply
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt apply buckets
        working-directory: terragrunt/env/staging/buckets
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply oidc
        working-directory: terragrunt/env/staging/oidc
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply glue
        working-directory: terragrunt/env/staging/glue
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply athena
        working-directory: terragrunt/env/staging/athena
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply alarms
        working-directory: terragrunt/env/staging/alarms
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply export
        working-directory: terragrunt/env/staging/export
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Terragrunt apply stepfunctions
        working-directory: terragrunt/env/staging/stepfunctions
        run: terragrunt run --non-interactive -- apply -auto-approve

      - name: Report deployment to Sentinel
        if: always()
        uses: cds-snc/sentinel-forward-data-action@0c349852373284a1130f87f8b91896132b0fc138
        with:
          input_data: '{"product": "data-lake", "sha": "${{ github.sha }}", "version": "Infrastructure ${{ github.sha }}", "repository": "${{ github.repository }}", "environment": "staging", "status": "${{ job.status }}"}'
          log_type: CDS_Product_Deployment_Data
          log_analytics_workspace_id: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          log_analytics_workspace_key: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}
