name: ETL pull request tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terragrunt/aws/glue/etl/**"
      - "terragrunt/aws/glue/curated/**"
      - ".github/workflows/etl-pull-request.yml"

env:
  GLUE_BASE_PATH: terragrunt/aws/glue

jobs:
  glue-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ETL modules
          - module_type: etl
            module_path: bes/crm
          - module_type: etl  
            module_path: platform/gc_forms
          - module_type: etl
            module_path: platform/gc_notify
          - module_type: etl
            module_path: platform/support/freshdesk
          # Curated modules
          - module_type: curated
            module_path: platform/gc_notify
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: changes
        with:
          filters: |
            module:
              - '${{ env.GLUE_BASE_PATH }}/${{ matrix.module_type }}/${{ matrix.module_path }}/**'
              - '.github/workflows/etl-pull-request.yml'

      - name: Setup python
        if: steps.changes.outputs.module == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Setup Java
        if: steps.changes.outputs.module == 'true'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run PR tests
        if: steps.changes.outputs.module == 'true'
        working-directory: ${{ env.GLUE_BASE_PATH }}/${{ matrix.module_type }}/${{ matrix.module_path }}
        run: make ARGS=--check pull_request
