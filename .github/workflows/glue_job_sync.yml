name: "Glue Job Sync"

on:
  schedule:
    - cron: "15 4 * * *" # Daily at 4:15am UTC
  workflow_dispatch:

env:
  AWS_REGION: ca-central-1

permissions: {}

jobs:
  glue-job-sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::739275439843:role/data-lake-apply
          role-session-name: TFApply
          aws-region: ${{ env.AWS_REGION }}

      - name: Create PR if changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/workflows/scripts/sync-glue-jobs.sh

  notify-workflow-failure:
    if: failure()
    needs:
      - glue-job-sync
    uses: ./.github/workflows/workflow-failure.yml
    with:
      workflow_name: ${{ github.workflow }}
      workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
      LOG_ANALYTICS_WORKSPACE_KEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.PRODUCTION_SLACK_WEBHOOK_OPS }}
